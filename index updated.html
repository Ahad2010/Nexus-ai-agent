<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexusAI – Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{--bg-base:#0b0e14;--bg-surface:#131720;--bg-elevated:#1a2030;--bg-input:#1e2535;--border:rgba(255,255,255,0.07);--border-focus:rgba(99,179,237,0.5);--accent:#63b3ed;--accent-soft:rgba(99,179,237,0.12);--accent-glow:rgba(99,179,237,0.25);--text-primary:#e8edf5;--text-secondary:#7a8499;--text-muted:#4a5568;--user-bubble:#1a4a80;--user-text:#d6eaff;--ai-bubble:#1a2030;--ai-text:#dde4f0;--shadow-sm:0 2px 8px rgba(0,0,0,0.3);--shadow-md:0 4px 20px rgba(0,0,0,0.4);--radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--sidebar-w:260px;--transition:0.22s cubic-bezier(0.4,0,0.2,1);}
[data-theme="light"]{--bg-base:#f0f4f9;--bg-surface:#ffffff;--bg-elevated:#f7f9fc;--bg-input:#ffffff;--border:rgba(0,0,0,0.08);--border-focus:rgba(37,99,235,0.4);--accent:#2563eb;--accent-soft:rgba(37,99,235,0.08);--accent-glow:rgba(37,99,235,0.15);--text-primary:#1a2035;--text-secondary:#5a6480;--text-muted:#9aa0b0;--user-bubble:#2563eb;--user-text:#ffffff;--ai-bubble:#ffffff;--ai-text:#1a2035;--shadow-sm:0 2px 8px rgba(0,0,0,0.06);--shadow-md:0 4px 20px rgba(0,0,0,0.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
body{display:flex;height:100dvh;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;gap:16px;transition:transform var(--transition);overflow:hidden;}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 0;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{font-size:20px;color:var(--accent);display:inline-block;animation:pulse-star 3s ease-in-out infinite;}
@keyframes pulse-star{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.15) rotate(20deg);}}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.3px;}
.sidebar-close{display:none;color:var(--text-secondary);font-size:14px;width:28px;height:28px;border-radius:6px;align-items:center;justify-content:center;transition:background var(--transition);}
.sidebar-close:hover{background:var(--bg-elevated);}
.new-chat-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border-radius:var(--radius-md);background:var(--accent-soft);color:var(--accent);font-family:var(--font-display);font-weight:600;font-size:14px;border:1px solid var(--accent-glow);transition:all var(--transition);}
.new-chat-btn:hover{background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow);}
.btn-icon{font-size:18px;line-height:1;}
.history-section{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
.history-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:0 6px;}
.history-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.history-item{padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all var(--transition);border:1px solid transparent;}
.history-item:hover{background:var(--bg-elevated);color:var(--text-primary);border-color:var(--border);}
.history-item.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-glow);}
.sidebar-footer{padding-top:10px;border-top:1px solid var(--border);}
.theme-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all var(--transition);}
.theme-toggle:hover{background:var(--bg-elevated);color:var(--text-primary);}
.toggle-icon{font-size:16px;}
.main-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base);}
.topbar{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px 0 20px;border-bottom:1px solid var(--border);background:var(--bg-surface);flex-shrink:0;}
.menu-btn{display:none;}
.topbar-title{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:600;font-size:16px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#48bb78;box-shadow:0 0 0 2px rgba(72,187,120,0.25);animation:blink 2.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);transition:all var(--transition);}
.icon-btn:hover{background:var(--bg-elevated);color:var(--text-primary);}
.voice-btn{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);transition:all var(--transition);}
.voice-btn:hover{background:var(--bg-elevated);color:var(--text-primary);}
.chat-area{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;scroll-behavior:smooth;}
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:40px 20px;animation:fadeUp 0.5s ease;position:relative;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.welcome-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none;animation:glow-pulse 4s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.7;transform:scale(1.1);}}
.welcome-icon{font-size:48px;color:var(--accent);position:relative;z-index:1;animation:spin-star 8s linear infinite;}
@keyframes spin-star{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.welcome-title{font-family:var(--font-display);font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--text-primary) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;letter-spacing:-0.5px;}
.welcome-sub{color:var(--text-secondary);font-size:16px;font-weight:300;position:relative;z-index:1;}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:540px;position:relative;z-index:1;margin-top:8px;}
.chip{padding:9px 18px;border-radius:100px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);font-size:13px;transition:all var(--transition);cursor:pointer;}
.chip:hover{border-color:var(--accent-glow);background:var(--accent-soft);color:var(--accent);transform:translateY(-2px);}
.messages-container{display:flex;flex-direction:column;gap:20px;}
.message-row{display:flex;gap:12px;animation:msgIn 0.3s ease;max-width:100%;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.message-row.user{flex-direction:row-reverse;}
.avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;}
.ai-avatar{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-glow);}
.user-avatar{background:var(--user-bubble);color:var(--user-text);font-family:var(--font-display);font-weight:700;font-size:13px;}
.message-bubble-wrap{display:flex;flex-direction:column;gap:4px;max-width:72%;}
.message-row.user .message-bubble-wrap{align-items:flex-end;}
.bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14.5px;line-height:1.65;word-break:break-word;}
.ai-bubble-style{background:var(--ai-bubble);color:var(--ai-text);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;box-shadow:var(--shadow-sm);}
.user-bubble-style{background:var(--user-bubble);color:var(--user-text);border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);box-shadow:var(--shadow-sm);}
.message-meta{display:flex;align-items:center;gap:8px;padding:0 4px;}
.meta-time{font-size:11px;color:var(--text-muted);}
.copy-btn{font-size:12px;color:var(--text-muted);padding:2px 8px;border-radius:4px;opacity:0;transition:all var(--transition);background:var(--bg-elevated);}
.message-bubble-wrap:hover .copy-btn{opacity:1;}
.copy-btn:hover{color:var(--accent);background:var(--accent-soft);}
.bubble code{background:rgba(99,179,237,0.12);color:var(--accent);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'Courier New',monospace;}
.bubble pre{background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5;}
.bubble pre code{background:none;padding:0;color:#a8d8a8;}
.typing-row{display:flex;gap:12px;align-items:flex-end;animation:msgIn 0.3s ease;}
.typing-bubble{display:flex;align-items:center;gap:5px;padding:14px 18px;background:var(--ai-bubble);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce-dot 1.4s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce-dot{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-8px);opacity:1;}}
.input-bar{padding:12px 20px 16px;background:var(--bg-surface);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.input-wrapper{display:flex;align-items:flex-end;gap:8px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:10px 10px 10px 14px;transition:border-color var(--transition),box-shadow var(--transition);}
.input-wrapper:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-glow);}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:15px;resize:none;max-height:130px;min-height:24px;overflow-y:auto;line-height:1.55;}
.chat-input::placeholder{color:var(--text-muted);}
.send-btn{width:38px;height:38px;min-width:38px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition);opacity:0.35;cursor:not-allowed;}
.send-btn.active{opacity:1;cursor:pointer;}
.send-btn.active:hover{transform:scale(1.08);box-shadow:0 4px 14px var(--accent-glow);}
.send-btn.active:active{transform:scale(0.95);}
.send-btn svg{width:17px;height:17px;transform:translateX(1px);}
.input-hint{font-size:11px;color:var(--text-muted);text-align:center;}
.mic-btn{width:38px;height:38px;min-width:38px;border-radius:12px;background:var(--bg-elevated);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;transition:all var(--transition);border:1.5px solid var(--border);}
.mic-btn:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-glow);}
.mic-btn.listening{background:rgba(255,80,80,0.15);color:#ff5050;border-color:rgba(255,80,80,0.4);animation:mic-pulse 1s ease-in-out infinite;}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0.3);}50%{box-shadow:0 0 0 8px rgba(255,80,80,0);}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border);padding:10px 22px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s ease;box-shadow:var(--shadow-md);z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);box-shadow:var(--shadow-md);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-close{display:flex;}.menu-btn{display:flex;}
  .message-bubble-wrap{max-width:85%;}
  .welcome-title{font-size:24px;}
  .chip{font-size:12px;padding:8px 14px;}
  .chat-area{padding:16px 14px;}
  .input-bar{padding:10px 14px 14px;}
}
.hidden{display:none!important;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199;}
.sidebar-overlay.show{display:block;}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><span class="logo-icon">✦</span><span class="logo-text">NexusAI</span></div>
    <button class="icon-btn sidebar-close" id="sidebarClose">✕</button>
  </div>
  <button class="new-chat-btn" id="newChatBtn"><span class="btn-icon">＋</span><span>New Chat</span></button>
  <div class="history-section">
    <p class="history-label">Recent</p>
    <div class="history-list" id="historyList"></div>
  </div>
  <div class="sidebar-footer">
    <div class="theme-toggle" id="themeToggle">
      <span class="toggle-icon" id="themeIcon">☀</span>
      <span id="themeLabel">Light Mode</span>
    </div>
  </div>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="icon-btn menu-btn" id="menuBtn">☰</button>
    <div class="topbar-title"><span class="status-dot"></span><span>NexusAI</span></div>
    <div style="display:flex;gap:4px;align-items:center;">
      <button class="voice-btn" id="voiceToggleBtn" title="Voice ON">🔊</button>
      <button class="icon-btn" id="clearBtn" title="Clear chat">🗑</button>
    </div>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-glow"></div>
      <div class="welcome-icon">✦</div>
      <h1 class="welcome-title">Hello, I'm NexusAI</h1>
      <p class="welcome-sub">Type or speak — I'm here to help! 🎤</p>
      <div class="suggestion-chips">
        <button class="chip" data-msg="What can you help me with?">What can you help me with?</button>
        <button class="chip" data-msg="Write a Python hello world program">Write a Python snippet</button>
        <button class="chip" data-msg="Explain machine learning in simple words">Explain machine learning</button>
        <button class="chip" data-msg="Give me 5 productivity tips">Productivity tips</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
  </main>

  <footer class="input-bar">
    <div class="input-wrapper">
      <button class="mic-btn" id="micBtn" title="Voice input">🎤</button>
      <textarea id="userInput" class="chat-input" placeholder="Type or speak a message…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter new line · 🎤 Mic to speak</p>
  </footer>
</div>

<div class="toast" id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
// ═══════════════════════════════════
//  🔧 BACKEND URL
// ═══════════════════════════════════
const BACKEND_URL = "https://nexus-ai-production-9c9e.up.railway.app/chat";
const CLEAR_URL   = "https://nexus-ai-production-9c9e.up.railway.app/clear";

// DOM
const chatArea          = document.getElementById("chatArea");
const messagesContainer = document.getElementById("messagesContainer");
const welcomeScreen     = document.getElementById("welcomeScreen");
const userInput         = document.getElementById("userInput");
const sendBtn           = document.getElementById("sendBtn");
const clearBtn          = document.getElementById("clearBtn");
const newChatBtn        = document.getElementById("newChatBtn");
const menuBtn           = document.getElementById("menuBtn");
const sidebar           = document.getElementById("sidebar");
const sidebarClose      = document.getElementById("sidebarClose");
const sidebarOverlay    = document.getElementById("sidebarOverlay");
const themeToggle       = document.getElementById("themeToggle");
const themeIcon         = document.getElementById("themeIcon");
const themeLabel        = document.getElementById("themeLabel");
const historyList       = document.getElementById("historyList");
const toast             = document.getElementById("toast");
const micBtn            = document.getElementById("micBtn");
const voiceToggleBtn    = document.getElementById("voiceToggleBtn");

// State
let chatSessions = [];
try { chatSessions = JSON.parse(localStorage.getItem("nexus_sessions") || "[]"); } catch(e) {}
let currentSession = null;
let isLoading      = false;
let toastTimer     = null;
let isListening    = false;
let voiceEnabled   = localStorage.getItem("nexus_voice") !== "false";

// Session ID for Memory
let SESSION_ID = localStorage.getItem("nexus_session_id");
if (!SESSION_ID) { SESSION_ID = 'session_' + Date.now(); localStorage.setItem("nexus_session_id", SESSION_ID); }

// ═══════════════════════════════════
// 🎤 SPEECH RECOGNITION
// ═══════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;

if (recognition) {
  recognition.continuous     = false;
  recognition.interimResults = true;
  recognition.lang           = 'en-US';
  recognition.onstart = () => { isListening = true; micBtn.classList.add("listening"); showToast("🎤 Listening... speak now!"); };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    userInput.value = transcript;
    autoResize();
    setSendActive(transcript.trim().length > 0);
    if (e.results[e.results.length - 1].isFinal) setTimeout(() => sendMessage(), 600);
  };
  recognition.onend  = () => { isListening = false; micBtn.classList.remove("listening"); };
  recognition.onerror = (e) => { isListening = false; micBtn.classList.remove("listening"); showToast("❌ Mic error: " + e.error); };
}

// ═══════════════════════════════════
// 🔊 TEXT TO SPEECH
// ═══════════════════════════════════
function speakText(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/```[\s\S]*?```/g,'code block').replace(/`([^`]+)`/g,'$1').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/#{1,6}\s/g,'').replace(/<[^>]*>/g,'').substring(0,500);
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.rate = 1.0; utterance.pitch = 1.0; utterance.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en')) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;
  window.speechSynthesis.speak(utterance);
}

function updateVoiceToggle() {
  voiceToggleBtn.textContent = voiceEnabled ? "🔊" : "🔇";
  voiceToggleBtn.title = voiceEnabled ? "Voice ON — click to mute" : "Voice OFF";
}

// Boot
loadTheme(); updateVoiceToggle(); startNewSession(); renderHistoryList();

// ═══════════════════════════════════
// 🧠 SESSION + MEMORY
// ═══════════════════════════════════
function startNewSession() {
  SESSION_ID = 'session_' + Date.now();
  localStorage.setItem("nexus_session_id", SESSION_ID);
  currentSession = { id: SESSION_ID, title: "New Chat", messages: [], createdAt: new Date().toISOString() };
  messagesContainer.innerHTML = "";
  welcomeScreen.classList.remove("hidden");
  userInput.value = ""; autoResize(); setSendActive(false);
}

function saveSession() {
  if (!currentSession || !currentSession.messages.length) return;
  if (currentSession.title === "New Chat" && currentSession.messages[0]) {
    const t = currentSession.messages[0].text;
    currentSession.title = t.length > 38 ? t.slice(0,38) + "…" : t;
  }
  const idx = chatSessions.findIndex(s => s.id === currentSession.id);
  const copy = JSON.parse(JSON.stringify(currentSession));
  if (idx >= 0) chatSessions[idx] = copy;
  else { chatSessions.unshift(copy); if (chatSessions.length > 30) chatSessions.pop(); }
  try { localStorage.setItem("nexus_sessions", JSON.stringify(chatSessions)); } catch(e) {}
  renderHistoryList();
}

function loadSession(session) {
  currentSession = JSON.parse(JSON.stringify(session));
  SESSION_ID = session.id;
  localStorage.setItem("nexus_session_id", SESSION_ID);
  messagesContainer.innerHTML = "";
  welcomeScreen.classList.add("hidden");
  session.messages.forEach(m => appendBubble(m.role, m.text, m.time, false));
  scrollBottom(); closeSidebar();
}

function renderHistoryList() {
  historyList.innerHTML = "";
  if (!chatSessions.length) { historyList.innerHTML = '<p style="font-size:12px;color:var(--text-muted);padding:8px 6px;">No history yet</p>'; return; }
  chatSessions.slice(0,20).forEach(s => {
    const el = document.createElement("div");
    el.className = "history-item" + (currentSession?.id === s.id ? " active" : "");
    el.textContent = s.title; el.title = s.title;
    el.onclick = () => loadSession(s);
    historyList.appendChild(el);
  });
}

// ═══════════════════════════════════
// 💬 SEND MESSAGE
// ═══════════════════════════════════
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  welcomeScreen.classList.add("hidden");
  const time = getTime();
  appendBubble("user", text, time);
  currentSession.messages.push({ role:"user", text, time });
  userInput.value = ""; autoResize(); setSendActive(false);

  const typingEl = showTyping();
  isLoading = true;

  try {
    const res = await fetch(BACKEND_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ message: text, sessionId: SESSION_ID })
    });
    const data = await res.json();
    if (!res.ok || data.status === "error") throw new Error(data.error || "Server error");

    typingEl.remove();
    const t2 = getTime();
    appendBubble("ai", data.reply, t2);
    currentSession.messages.push({ role:"ai", text: data.reply, time: t2 });
    speakText(data.reply); // 🔊 Voice reply

  } catch(err) {
    typingEl.remove();
    const t2 = getTime();
    const msg = err.message.includes("fetch") || err.message.includes("Failed")
      ? "⚠️ Backend connect nahi.\n1. 'node server.js' chalao terminal mein\n2. BACKEND_URL check karo"
      : "❌ " + err.message;
    appendBubble("ai", msg, t2);
    currentSession.messages.push({ role:"ai", text: msg, time: t2 });
  }

  isLoading = false; saveSession(); scrollBottom();
}

// ═══════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════
function appendBubble(role, text, time, animate=true) {
  const isUser = role === "user";
  const row = document.createElement("div");
  row.className = "message-row " + role;
  if (!animate) row.style.animation = "none";
  row.innerHTML = `
    <div class="avatar ${isUser?"user-avatar":"ai-avatar"}">${isUser?"U":"✦"}</div>
    <div class="message-bubble-wrap">
      <div class="bubble ${isUser?"user-bubble-style":"ai-bubble-style"}">${fmt(text)}</div>
      <div class="message-meta"><span class="meta-time">${time}</span><button class="copy-btn">Copy</button></div>
    </div>`;
  row.querySelector(".copy-btn").onclick = () => navigator.clipboard.writeText(text).then(()=>showToast("✓ Copied!")).catch(()=>showToast("Failed"));
  messagesContainer.appendChild(row); scrollBottom();
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.innerHTML = `<div class="avatar ai-avatar">✦</div><div class="typing-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  messagesContainer.appendChild(row); scrollBottom(); return row;
}

function fmt(text) {
  let t = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t = t.replace(/```([\s\S]*?)```/g,"<pre><code>$1</code></pre>");
  t = t.replace(/`([^`]+)`/g,"<code>$1</code>");
  t = t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  t = t.replace(/\*(.+?)\*/g,"<em>$1</em>");
  t = t.replace(/\n/g,"<br>"); return t;
}

function scrollBottom() { requestAnimationFrame(()=>chatArea.scrollTo({top:chatArea.scrollHeight,behavior:"smooth"})); }
function getTime() { return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function setSendActive(on) { sendBtn.classList.toggle("active",on); sendBtn.disabled = !on; }
function autoResize() { userInput.style.height="auto"; userInput.style.height=Math.min(userInput.scrollHeight,130)+"px"; }

// ═══════════════════════════════════
// EVENTS
// ═══════════════════════════════════
sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
userInput.addEventListener("input", ()=>{ setSendActive(userInput.value.trim().length>0); autoResize(); });
document.querySelectorAll(".chip").forEach(c => {
  c.addEventListener("click", ()=>{ userInput.value=c.dataset.msg; setSendActive(true); autoResize(); sendMessage(); });
});

micBtn.addEventListener("click", () => {
  if (!recognition) { showToast("❌ Chrome use karo voice ke liye!"); return; }
  if (isListening) recognition.stop(); else recognition.start();
});

voiceToggleBtn.addEventListener("click", () => {
  voiceEnabled = !voiceEnabled;
  localStorage.setItem("nexus_voice", voiceEnabled);
  updateVoiceToggle();
  if (!voiceEnabled) window.speechSynthesis?.cancel();
  showToast(voiceEnabled ? "🔊 Voice ON" : "🔇 Voice OFF");
});

newChatBtn.addEventListener("click", async () => {
  try { await fetch(CLEAR_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:SESSION_ID})}); } catch(e) {}
  window.speechSynthesis?.cancel();
  startNewSession(); renderHistoryList(); closeSidebar();
  showToast("🧠 New chat started!");
});

clearBtn.addEventListener("click", async () => {
  if (!messagesContainer.innerHTML) return;
  try { await fetch(CLEAR_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:SESSION_ID})}); } catch(e) {}
  window.speechSynthesis?.cancel();
  messagesContainer.innerHTML = "";
  if (currentSession) currentSession.messages = [];
  welcomeScreen.classList.remove("hidden");
  showToast("🧠 Chat & memory cleared!");
});

menuBtn.addEventListener("click", ()=>{ sidebar.classList.add("open"); sidebarOverlay.classList.add("show"); });
sidebarClose.addEventListener("click", closeSidebar);
sidebarOverlay.addEventListener("click", closeSidebar);
themeToggle.addEventListener("click", toggleTheme);

function closeSidebar() { sidebar.classList.remove("open"); sidebarOverlay.classList.remove("show"); }
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", dark?"light":"dark");
  themeIcon.textContent = dark?"☽":"☀";
  themeLabel.textContent = dark?"Dark Mode":"Light Mode";
  try { localStorage.setItem("nexus_theme", dark?"light":"dark"); } catch(e) {}
}
function loadTheme() {
  try {
    const saved = localStorage.getItem("nexus_theme") || "dark";
    document.documentElement.setAttribute("data-theme", saved);
    if (saved==="light") { themeIcon.textContent="☽"; themeLabel.textContent="Dark Mode"; }
  } catch(e) {}
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 2200);
}
</script>
</body>
</html>
